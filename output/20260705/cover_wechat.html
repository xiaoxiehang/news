<!DOCTYPE html>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:460px; overflow:hidden;

.cover { width:1080px; height:460px; background:linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);

.news-list { flex:1; position:relative;z-index:10; }
.footer { margin-top:auto; color:rgba(255,255,255,0.8); font-size:16px;
