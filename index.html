<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻简讯</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        .card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        .card-title {
            font-size: 1.1em;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-meta {
            font-size: 0.9em;
            color: #666;
        }
        .card-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .card-link:hover {
            text-decoration: underline;
        }
        .cover-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .cover-item {
            text-align: center;
        }
        .cover-item img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .cover-item img:hover {
            transform: scale(1.02);
        }
        .cover-label {
            margin-top: 10px;
            font-weight: 600;
            color: #333;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.5;
        }
        code {
            color: #e83e8c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 每日新闻简讯</h1>
            <p>每日精选国内外重要新闻</p>
            <div class="btn-group">
                <a href="content_wechat.txt" class="btn" target="_blank">📢 公众号版</a>
                <a href="content_xhs.txt" class="btn" target="_blank">📱 小红书版</a>
            </div>
        </div>
        
        <div class="content">
            <div class="section">
                <h2 class="section-title">🖼️ 封面图</h2>
                <div class="cover-grid">
                    <div class="cover-item">
                        <img src="cover_wechat.png" alt="公众号封面">
                        <div class="cover-label">公众号封面</div>
                        <a href="cover_wechat.png" class="card-link" target="_blank">查看原图</a>
                    </div>
                    <div class="cover-item">
                        <img src="cover_xhs.png" alt="小红书封面">
                        <div class="cover-label">小红书封面</div>
                        <a href="cover_xhs.png" class="card-link" target="_blank">查看原图</a>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">📥 下载链接</h2>
                <div class="card">
                    <div class="card-title">公众号版内容</div>
                    <div class="card-meta">格式：TXT 文本</div>
                    <a href="content_wechat.txt" class="card-link" target="_blank">下载 content_wechat.txt</a>
                </div>
                <div class="card">
                    <div class="card-title">小红书版内容</div>
                    <div class="card-meta">格式：TXT 文本</div>
                    <a href="content_xhs.txt" class="card-link" target="_blank">下载 content_xhs.txt</a>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">🔗 直接访问</h2>
                <div class="card">
                    <pre><code>https://xiaoxiehang.github.io/news/content_wechat.txt</code></pre>
                </div>
                <div class="card">
                    <pre><code>https://xiaoxiehang.github.io/news/content_xhs.txt</code></pre>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>每日更新 · 值得关注</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/xiaoxiehang/news" style="color: #667eea;" target="_blank">GitHub 仓库</a>
            </p>
        </div>
    </div>
</body>
</html>
