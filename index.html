<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日新闻简讯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #f5f5f5;
    color: #222;
    line-height: 1.6;
}

/* Header */
.header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 100;
}
.header-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header-left h1 {
    font-size: 20px;
    font-weight: 600;
    color: #222;
}
.header-left p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
}
.header-right {
    text-align: right;
}
.header-date {
    font-size: 14px;
    font-weight: 500;
    color: #333;
}
.header-weekday {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
}

/* Main */
.main {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

/* Copy button */
.copy-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 20px;
}
.copy-btn.copied {
    background: #4CAF50;
}

/* News list */
.news-list {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
}
.news-item {
    padding: 20px;
    border-bottom: 1px solid #eee;
}
.news-item:last-child {
    border-bottom: none;
}
.news-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
}
.news-title {
    font-size: 16px;
    font-weight: 600;
    color: #222;
    line-height: 1.5;
    flex: 1;
}
.news-title a {
    color: #222;
    text-decoration: none;
}
.news-title a:hover {
    color: #0066cc;
}
.news-source {
    font-size: 12px;
    color: #999;
    margin-left: 12px;
    white-space: nowrap;
}
.news-summary {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-top: 8px;
}
.news-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 13px;
    color: #0066cc;
    text-decoration: none;
}
.news-link:hover {
    text-decoration: underline;
}

/* Loading */
.loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
    font-size: 15px;
}

/* Footer */
.footer {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
}
.footer-content {
    color: #888;
    font-size: 13px;
    line-height: 1.8;
}
.footer-content a {
    color: #0066cc;
    text-decoration: none;
}

/* Covers section */
.covers-section {
    margin-top: 40px;
    background: #fff;
    border-radius: 8px;
    padding: 20px;
}
.covers-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #222;
}
.covers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}
.cover-item {
    text-align: center;
}
.cover-item img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
}
.cover-label {
    font-size: 13px;
    color: #888;
    margin-top: 8px;
}

@media (max-width: 600px) {
    .header-inner {
        flex-direction: column;
        align-items: flex-start;
    }
    .header-right {
        margin-top: 8px;
        text-align: left;
    }
    .covers-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<header class="header">
    <div class="header-inner">
        <div class="header-left">
            <h1 id="header-title">今日精选新闻</h1>
            <p>每日更新国内外重要资讯，助你快速了解世界动态</p>
        </div>
        <div class="header-right">
            <div class="header-date" id="header-date">--</div>
            <div class="header-weekday" id="header-weekday">--</div>
        </div>
    </div>
</header>

<main class="main">
    <button class="copy-btn" id="copy-btn" onclick="copyAllNews()">一键复制所有新闻</button>
    
    <div class="news-list" id="news-container">
        <div class="loading">加载中...</div>
    </div>

    <section class="covers-section" id="covers-section" style="display:none;">
        <div class="covers-title">封面图</div>
        <div class="covers-grid">
            <div class="cover-item">
                <img src="cover_wechat.png" alt="公众号封面" onclick="window.open('cover_wechat.png','_blank')">
                <div class="cover-label">公众号封面</div>
            </div>
            <div class="cover-item">
                <img src="cover_xhs.png" alt="小红书封面" onclick="window.open('cover_xhs.png','_blank')">
                <div class="cover-label">小红书封面</div>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="footer-content">
        每日更新 · 值得关注<br>
        <a href="https://github.com/xiaoxiehang/news" target="_blank">GitHub 仓库</a>
    </div>
</footer>

<script>
let allNews = [];

function setHeaderDate() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const weekday = weekdays[now.getDay()];
    
    document.getElementById('header-date').textContent = `${year}年${month}月${day}日`;
    document.getElementById('header-weekday').textContent = weekday;
}

function copyAllNews() {
    if (!allNews.length) return;
    
    const text = allNews.map((news, i) => {
        return `${i + 1}. ${news.title}\n${news.summary || ''}`;
    }).join('\n\n');
    
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '已复制!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = '一键复制所有新闻';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function renderNews(newsList) {
    allNews = newsList;
    const container = document.getElementById('news-container');
    
    if (!newsList.length) {
        container.innerHTML = '<div class="loading">暂无新闻数据</div>';
        return;
    }
    
    container.innerHTML = newsList.map((news, i) => {
        const hasLink = news.link && news.link.startsWith('http');
        const titleHtml = hasLink
            ? `<a href="${news.link}" target="_blank">${news.title}</a>`
            : news.title;
        const linkHtml = hasLink
            ? `<a href="${news.link}" target="_blank" class="news-link">查看详情 →</a>`
            : '';
        
        return `
            <div class="news-item">
                <div class="news-item-header">
                    <div class="news-title">${titleHtml}</div>
                    ${news.source ? `<div class="news-source">${news.source}</div>` : ''}
                </div>
                ${news.summary ? `<div class="news-summary">${news.summary}</div>` : ''}
                ${linkHtml}
            </div>
        `;
    }).join('');
    
    document.getElementById('covers-section').style.display = '';
}

async function loadNews() {
    try {
        const response = await fetch('news_data.json?t=' + Date.now());
        const data = await response.json();
        
        let newsList = [];
        if (Array.isArray(data)) {
            newsList = data;
        } else if (data.news) {
            newsList = data.news;
        }
        
        renderNews(newsList);
    } catch (error) {
        console.error('加载新闻失败:', error);
        document.getElementById('news-container').innerHTML = 
            '<div class="loading">加载失败，请刷新重试</div>';
    }
}

setHeaderDate();
loadNews();
</script>
</body>
</html>
