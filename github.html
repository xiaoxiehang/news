<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 热门项目</title>
<style>
:root {
  --rausch: #FF5A5F;
  --rausch-dark: #E00E2F;
  --text-primary: #222222;
  --text-secondary: #717171;
  --text-tertiary: #B0B0B0;
  --bg: #FFFFFF;
  --bg-secondary: #F7F7F7;
  --border: #EBEBEB;
  --border-dark: #DDDDDD;
  --success: #00A699;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.12);
  --font: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --max-width: 1280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  line-height: 1.3;
  flex-shrink: 0;
}
.header-date {
  flex: 1;
  text-align: center;
}
.header-date-day {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
.header-date-weekday {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.header-nav {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.nav-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 20px;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-link:hover {
  color: var(--text-primary);
  background: var(--bg-secondary);
}
.nav-link.active {
  color: var(--rausch);
  background: rgba(255, 90, 95, 0.1);
}

/* ===== Main ===== */
.main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px 24px;
}

/* ===== Categories ===== */
.categories {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.category-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.category-btn:hover {
  border-color: var(--text-primary);
  color: var(--text-primary);
}
.category-btn.active {
  background: var(--text-primary);
  color: #fff;
  border-color: var(--text-primary);
}

/* ===== Section ===== */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 24px;
}
.section-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
}
.section-desc {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ===== Projects Grid ===== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.project-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.project-card:hover {
  border-color: var(--text-primary);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.project-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.project-info {
  flex: 1;
  min-width: 0;
}
.project-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 4px;
  word-break: break-word;
}
.project-owner {
  font-size: 13px;
  color: var(--text-secondary);
}
.project-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.project-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-secondary);
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.meta-icon {
  width: 14px;
  height: 14px;
  display: inline-block;
}
.meta-value {
  font-weight: 600;
}
.language-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

/* ===== Loading ===== */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}

/* ===== Empty ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.empty-desc {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ===== Footer ===== */
.footer {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px 24px;
  text-align: center;
  border-top: 1px solid var(--border);
  margin-top: 60px;
}
.footer-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.footer-link {
  font-size: 13px;
  color: var(--text-primary);
  text-decoration: none;
  font-weight: 600;
}
.footer-link:hover {
  color: var(--rausch);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header-inner {
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 20px;
  }
  .header-date {
    order: -1;
    text-align: left;
    flex: 1 1 100%;
  }
  .header-title { font-size: 19px; }
  .main { padding: 24px 20px; }
  .categories {
    overflow-x: auto;
    flex-wrap: nowrap;
    padding-bottom: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .category-btn {
    flex-shrink: 0;
  }
  .section-header {
    flex-direction: column;
    align-items: flex-start;
  }
  .projects-grid {
    grid-template-columns: 1fr;
  }
  .footer { padding: 32px 20px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-title">GitHub 热门项目</div>
    <div class="header-date">
      <div class="header-date-day" id="header-date"></div>
      <div class="header-date-weekday" id="header-weekday"></div>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">新闻</a>
      <a href="github.html" class="nav-link active">GitHub</a>
    </nav>
  </div>
</header>

<main class="main">
  <div class="categories" id="categories">
    <!-- 动态生成 -->
  </div>

  <div id="projects-container">
    <div class="loading">加载中...</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-text">每日更新 · 值得关注</div>
  <a href="https://github.com/xiaoxiehang/news" target="_blank" class="footer-link">GitHub 仓库</a>
</footer>

<script>
const CATEGORIES = [
  { id: 'trending', name: 'Trending', desc: '今日最热门项目' },
  { id: 'ai', name: 'AI & ML', desc: '人工智能、机器学习' },
  { id: 'frontend', name: 'Frontend', desc: '前端框架、UI库' },
  { id: 'devtools', name: 'Dev Tools', desc: '开发者工具、CLI' },
  { id: 'productivity', name: 'Productivity', desc: '效率工具、自动化' },
  { id: 'fullstack', name: 'Full Stack', desc: '全栈项目' },
  { id: 'mobile', name: 'Mobile', desc: '移动端、Flutter、React Native' },
  { id: 'backend', name: 'Backend', desc: '后端框架、数据库' }
];

const TOPIC_MAP = {
  'trending': 'stars:>10000',
  'ai': 'topic:artificial-intelligence OR topic:machine-learning OR topic:deep-learning',
  'frontend': 'topic:frontend OR topic:react OR topic:vue OR topic:javascript',
  'devtools': 'topic:developer-tools OR topic:cli OR topic:devtools',
  'productivity': 'topic:productivity OR topic:automation OR topic:workflow',
  'fullstack': 'topic:fullstack OR topic:web-application OR topic:nextjs',
  'mobile': 'topic:mobile OR topic:flutter OR topic:react-native OR topic:ios OR topic:android',
  'backend': 'topic:backend OR topic:database OR topic:api OR topic:nodejs'
};

let currentCategory = 'trending';

let githubData = null;

const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function setHeaderDate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  document.getElementById('header-date').textContent = y + '年' + m + '月' + d + '日';
  document.getElementById('header-weekday').textContent = WEEKDAYS[now.getDay()];
}

function renderCategories() {
  const container = document.getElementById('categories');
  const cats = githubData ? Object.keys(githubData.categories).map(id => ({
    id, ...githubData.categories[id]
  })) : CATEGORIES;
  container.innerHTML = cats.map(cat => 
    `<button class="category-btn ${cat.id === currentCategory ? 'active' : ''}" 
             onclick="switchCategory('${cat.id}')">
      ${cat.name}
    </button>`
  ).join('');
}

function switchCategory(categoryId) {
  currentCategory = categoryId;
  renderCategories();
  renderProjects();
}

function renderProjects() {
  const container = document.getElementById('projects-container');
  
  if (!githubData) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-title">加载失败</div>
      <div class="empty-desc">请稍后刷新重试</div>
    </div>`;
    return;
  }
  
  const cat = githubData.categories[currentCategory];
  if (!cat) return;
  
  const projects = cat.repos || [];
  
  if (!projects.length) {
    container.innerHTML = `
      <div class="section-header">
        <h2 class="section-title">${cat.name}</h2>
        <span class="section-desc">${cat.desc}</span>
      </div>
      <div class="empty-state">
        <div class="empty-title">暂无项目</div>
        <div class="empty-desc">该分类下暂无热门项目</div>
      </div>
    `;
    return;
  }

  const langColors = {
    'JavaScript': '#f1e05a', 'TypeScript': '#2b7489', 'Python': '#3572A5',
    'Java': '#b07219', 'Go': '#00ADD8', 'Rust': '#dea584',
    'C++': '#f34b7d', 'C': '#555555', 'Ruby': '#701516',
    'PHP': '#4F5D95', 'Swift': '#ffac45', 'Kotlin': '#F18E33',
    'Dart': '#00B4AB', 'HTML': '#e34c26', 'CSS': '#563d7c'
  };

  container.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">${cat.name}</h2>
      <span class="section-desc">${cat.desc}</span>
    </div>
    <div class="projects-grid">
      ${projects.map(project => {
        const stars = formatNumber(project.stars);
        const forks = formatNumber(project.forks);
        const langColor = langColors[project.language] || '#888';
        return `
          <a href="https://github.com/${project.full_name}" target="_blank" class="project-card">
            <div class="project-header">
              <div class="project-info">
                <div class="project-name">${project.name}</div>
                <div class="project-owner">${project.owner}</div>
              </div>
            </div>
            <div class="project-desc">${project.description || '暂无描述'}</div>
            <div class="project-meta">
              ${project.language ? `
                <div class="meta-item">
                  <span class="language-dot" style="background:${langColor}"></span>
                  <span class="meta-value">${project.language}</span>
                </div>
              ` : ''}
              <div class="meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
                </svg>
                <span class="meta-value">${stars}</span>
              </div>
              <div class="meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.378v-.878zm-1.5 6.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm10.5-6.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm-1.5 6.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
                </svg>
                <span class="meta-value">${forks}</span>
              </div>
            </div>
          </a>
        `;
      }).join('')}
    </div>
  `;
}

function formatNumber(num) {
  if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
  return num.toString();
}

// 加载数据
fetch('data/github.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    githubData = data;
    renderCategories();
    renderProjects();
  })
  .catch(err => {
    console.error('加载失败:', err);
    renderProjects();
  });

setHeaderDate();
</script>
</body>
</html>
