<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掘金热榜</title>
<style>
:root {
  --rausch: #FF5A5F;
  --rausch-dark: #E00E2F;
  --text-primary: #222222;
  --text-secondary: #717171;
  --text-tertiary: #B0B0B0;
  --bg: #FFFFFF;
  --bg-secondary: #F7F7F7;
  --border: #EBEBEB;
  --border-dark: #DDDDDD;
  --success: #00A699;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.12);
  --font: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --max-width: 1280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  line-height: 1.3;
}
.header-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.header-nav {
  display: flex;
  gap: 8px;
}
.nav-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 20px;
  transition: all 0.2s;
}
.nav-link:hover {
  color: var(--text-primary);
  background: var(--bg-secondary);
}
.nav-link.active {
  color: var(--rausch);
  background: rgba(255, 90, 95, 0.1);
}

/* ===== Main ===== */
.main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 32px 24px;
}

/* ===== Articles List ===== */
.articles-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
}
.article-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  display: flex;
  gap: 20px;
}
.article-card:hover {
  border-color: var(--text-primary);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.article-cover {
  width: 160px;
  height: 100px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  flex-shrink: 0;
}
.article-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.article-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 8px;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-secondary);
  flex-wrap: wrap;
}
.article-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.meta-icon {
  width: 14px;
  height: 14px;
}
.article-category {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-secondary);
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-right: 8px;
}

/* ===== Infinite Scroll ===== */
.load-more {
  text-align: center;
  padding: 40px 20px;
}
.load-more-btn {
  padding: 12px 32px;
  background: var(--bg);
  border: 2px solid var(--border-dark);
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.load-more-btn:hover {
  border-color: var(--text-primary);
  color: var(--text-primary);
}
.load-more-btn.loading {
  opacity: 0.6;
  cursor: not-allowed;
}

/* ===== Loading ===== */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}

/* ===== Empty ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.empty-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.empty-desc {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ===== Footer ===== */
.footer {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px 24px;
  text-align: center;
  border-top: 1px solid var(--border);
  margin-top: 60px;
}
.footer-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.footer-link {
  font-size: 13px;
  color: var(--text-primary);
  text-decoration: none;
  font-weight: 600;
}
.footer-link:hover {
  color: var(--rausch);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  .header-nav {
    width: 100%;
    justify-content: flex-start;
  }
  .header-title { font-size: 19px; }
  .main { padding: 24px 16px; }
  .article-card { flex-direction: column; }
  .article-cover { width: 100%; height: 180px; }
  .footer { padding: 32px 16px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div>
        <div class="header-title">掘金热榜</div>
        <div class="header-subtitle">国内技术社区热门</div>
      </div>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">新闻</a>
      <a href="github.html" class="nav-link">GitHub</a>
      <a href="hackernews.html" class="nav-link">Hacker News</a>
      <a href="juejin.html" class="nav-link active">掘金</a>
    </nav>
  </div>
</header>

<main class="main">
  <div id="articles-container">
    <div class="loading">加载中...</div>
  </div>

  <div class="load-more" id="load-more" style="display:none;">
    <button class="load-more-btn" onclick="loadMore()">加载更多</button>
  </div>
</main>

<footer class="footer">
  <div class="footer-text">每日更新 · 值得关注</div>
  <a href="https://github.com/xiaoxiehang/news" target="_blank" class="footer-link">GitHub 仓库</a>
</footer>

<script>
const ITEMS_PER_LOAD = 10;
let currentPage = 1;
let articles = [];
let displayedArticles = [];

function renderArticles() {
  const container = document.getElementById('articles-container');
  const loadMoreDiv = document.getElementById('load-more');
  
  if (!articles.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">暂无数据</div>
      <div class="empty-desc">请稍后刷新重试</div>
    </div>`;
    loadMoreDiv.style.display = 'none';
    return;
  }

  displayedArticles = articles.slice(0, currentPage * ITEMS_PER_LOAD);
  
  container.innerHTML = `
    <div class="articles-list">
      ${displayedArticles.map((article, idx) => `
        <a href="${article.url}" target="_blank" class="article-card">
          ${article.cover ? `<img src="${article.cover}" class="article-cover" alt="">` : ''}
          <div class="article-content">
            <div class="article-title">${idx + 1}. ${article.title}</div>
            <div class="article-desc">${article.digest}</div>
            <div class="article-meta">
              ${article.category ? `<span class="article-category">${article.category}</span>` : ''}
              <div class="article-meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M2 5.5a3.5 3.5 0 117 0 3.5 3.5 0 01-7 0zm12.5 7.5c0-2.485-2.015-4.5-4.5-4.5H4.5c-2.485 0-4.5 2.015-4.5 4.5 0 .138.058.27.162.369a.5.5 0 00.838-.297c.07-.188.188-.332.338-.441A3.5 3.5 0 014.5 11.5h7a3.5 3.5 0 013.162 1.631.5.5 0 00.838.297A.5.5 0 0015.5 13z"/>
                </svg>
                <span>${article.author}</span>
              </div>
              <div class="article-meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.268 1.09 2.19 2.615 2.465 4.07a.5.5 0 01-.976.192C14.156 7.098 13.374 5.79 12.29 4.855 11.207 3.92 9.804 3 8 3s-3.207.92-4.29 1.855C2.626 5.79 1.844 7.098 1.578 8.34a.5.5 0 01-.976-.192c.275-1.455 1.197-2.98 2.465-4.07C4.329 2.992 6.019 2 8 2z"/>
                  <circle cx="8" cy="8.5" r="2.5"/>
                </svg>
                <span>${formatNumber(article.views)}</span>
              </div>
              <div class="article-meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 1.5a.5.5 0 01.44.26l1.822 3.436 3.966.714a.5.5 0 01.274.83l-2.79 2.936.558 3.948a.5.5 0 01-.71.518L8 11.882l-3.56 1.862a.5.5 0 01-.71-.518l.558-3.948-2.79-2.936a.5.5 0 01.274-.83l3.966-.714L7.56 1.76A.5.5 0 018 1.5z"/>
                </svg>
                <span>${formatNumber(article.likes)}</span>
              </div>
              <div class="article-meta-item">
                <svg class="meta-icon" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M14 1a1 1 0 011 1v8a1 1 0 01-1 1H4.414A2 2 0 003 11.586V12a1 1 0 01-1 1H1a1 1 0 01-1-1V2a1 1 0 011-1h13zM2 0a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V2a2 2 0 00-2-2H2z"/>
                  <path d="M2 3.5a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h5a.5.5 0 010 1h-5a.5.5 0 01-.5-.5z"/>
                </svg>
                <span>${article.comments}</span>
              </div>
            </div>
          </div>
        </a>
      `).join('')}
    </div>
  `;

  if (displayedArticles.length < articles.length) {
    loadMoreDiv.style.display = 'block';
  } else {
    loadMoreDiv.style.display = 'none';
  }
}

function loadMore() {
  currentPage++;
  renderArticles();
}

function formatNumber(num) {
  if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
  return num.toString();
}

// 加载数据
fetch('data/juejin.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    articles = data.articles || [];
    renderArticles();
  })
  .catch(err => {
    console.error('加载失败:', err);
    renderArticles();
  });
</script>
</body>
</html>
