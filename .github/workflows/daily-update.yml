name: Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 (北京时间 08:00)
  workflow_dispatch:  # 手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Fetch GitHub trending
      run: python scripts/fetch_github.py
      
    - name: Fetch Hacker News
      run: python scripts/fetch_hackernews.py
      
    - name: Fetch Juejin trending
      run: python scripts/fetch_juejin.py
      
    - name: Fetch misc (quotes & weather)
      run: python scripts/fetch_misc.py
      
    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
        git push
